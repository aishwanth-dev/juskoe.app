<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/juskoe-logo.png" />
    <title>Juskoe</title>
    <meta name="description" content="Juskoe is a system-wide voice layer for your OS. Speak naturally and get polished text in any app instantly." />
    <meta name="author" content="Juskoe" />

    <meta property="og:title" content="Juskoe" />
    <meta property="og:description" content="A universal voice command bar for text and actions. Speak naturally, get polished text anywhere." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://juskoe.in/juskoe-logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@juskoe" />
    <meta name="twitter:image" content="https://juskoe.in/juskoe-logo.png" />
  </head>

  <body>
    <div id="root"></div>
    <script>
    // Catch OAuth tokens on ANY page (including root if Supabase falls back to Site URL)
    // Redirects to the dedicated callback handler so tokens get relayed to desktop app.
    (function() {
      var hash = location.hash.substring(1);
      if (!hash) hash = location.search.substring(1);
      if (hash) {
        var params = new URLSearchParams(hash);
        if (params.get('access_token') || params.get('refresh_token')) {
          // Preserve the fragment while redirecting to the callback handler
          if (location.pathname !== '/auth/callback') {
            location.replace('/auth/callback' + location.hash);
          }
        }
      }
    })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
